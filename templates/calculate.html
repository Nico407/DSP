{% extends "base.html" %}
{% block content %}
<h2>Calculate your macros</h2>
<p>Enter your stats below. We'll save you as a new user and take you to your dashboard.</p>

<form method="post" action="/app/calculate">
  <label>Name
    <input name="name" required placeholder="e.g. Alex">
  </label>

  <div class="grid">
    <label>Sex
      <select name="sex" required>
        <option value="male">male</option>
        <option value="female">female</option>
      </select>
    </label>
    <label>Age
      <input type="number" name="age" min="1" max="119" value="30" required>
    </label>
  </div>

  <div class="grid">
    <label>Height (cm)
      <input type="number" step="0.1" name="height" value="180" required>
    </label>
    <label>Weight (kg)
      <input type="number" step="0.1" name="weight" value="80" required>
    </label>
  </div>

  <label>Activity level
    <select name="activity_level" required>
      <option value="1">1 — sedentary (desk job, no exercise)</option>
      <option value="2">2 — light (1–3 sessions/week)</option>
      <option value="3" selected>3 — moderate (3–5 sessions/week)</option>
      <option value="4">4 — active (6–7 sessions/week)</option>
      <option value="5">5 — extreme (athlete / physical job)</option>
    </select>
  </label>

  <label>Goal
    <select name="goal_choice" required>
      <option value="1">strong gain (+0.5 kg/week)</option>
      <option value="2">mild gain (+0.25 kg/week)</option>
      <option value="3" selected>maintain weight</option>
      <option value="4">mild loss (-0.25 kg/week)</option>
      <option value="5">strong loss (-0.5 kg/week)</option>
    </select>
  </label>

  <button type="submit">Calculate &amp; save</button>
</form>
{% endblock %}
